<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#08090c" />
  <title>SIX3° offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #08090c;
      color: #fff;
      font-family: Manrope, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.22), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.16), transparent 30%),
        linear-gradient(135deg, rgba(255,255,255,0.04), transparent 55%);
      pointer-events: none;
    }
    main {
      position: relative;
      width: min(100%, 440px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      padding: 28px;
      background: rgba(18, 19, 26, 0.86);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
    }
    img { width: 112px; height: auto; display: block; margin-bottom: 24px; }
    h1 { margin: 0 0 12px; font-size: clamp(24px, 7vw, 34px); line-height: 1.05; }
    p { margin: 0; color: rgba(255, 255, 255, 0.68); line-height: 1.6; }
    button, a {
      margin-top: 22px;
      width: 100%;
      display: inline-flex;
      justify-content: center;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      background: linear-gradient(135deg, #4667ff, #7c3aed);
      color: white;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    small { display: block; margin-top: 14px; color: rgba(255, 255, 255, 0.42); line-height: 1.5; }
  </style>
</head>
<body>
  <main>
    <img src="/logo.svg" alt="SIX3°" />
    <h1>Voce esta offline</h1>
    <p>Voce pode continuar usando o aplicativo com os dados salvos neste dispositivo. As alteracoes pendentes serao enviadas quando a internet voltar.</p>
    <button type="button" onclick="window.location.href='/app/dashboard'">Voltar para o aplicativo</button>
    <small>Se esta for a primeira vez neste dispositivo, abra o app online uma vez para preparar o modo offline.</small>
  </main>
  <script>
    window.addEventListener('online', function () {
      window.location.href = '/app/dashboard';
    });
  </script>
</body>
</html>
