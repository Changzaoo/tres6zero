services:
  - type: web
    name: six3
    runtime: node
    plan: free
    buildCommand: npm install --workspace=@six3/server --include-workspace-root=false && npm run build:server
    startCommand: npm run start --workspace=@six3/server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: PUBLIC_BACKEND_URL
        value: https://tres6zero.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        value: https://xmuawzcpydmbcqackgoz.supabase.co
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: chat-latest
      - key: PYTHON_BIN
        value: python3
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
