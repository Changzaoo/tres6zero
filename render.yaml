services:
  - type: web
    name: six3
    runtime: node
    plan: free
    buildCommand: npm install --workspace=@six3/server --include-workspace-root=false && npm run build:server
    startCommand: npm run start --workspace=@six3/server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: PUBLIC_BACKEND_URL
        value: https://six3-m0wr.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PIXGO_API_KEY
        sync: false
      - key: PIXGO_API_SECRET_KEY
        sync: false
      - key: PIXGO_PUBLIC_KEY
        sync: false
      - key: PIXGO_WEBHOOK_SECRET
        sync: false
      - key: PIXGO_API_BASE_URL
        value: https://pixgo.org/api/v1
      - key: SUPABASE_URL
        value: https://xmuawzcpydmbcqackgoz.supabase.co
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: chat-latest
      - key: SUNO_API_KEY
        sync: false
      - key: SUNO_API_BASE_URL
        value: https://api.sunoapi.org
      - key: SUNO_MODEL
        value: V4_5ALL
      - key: SUNO_CALLBACK_URL
        value: https://six3-m0wr.onrender.com/api/music/suno/callback
      - key: SIX3_SEED_SECRET
        sync: false
      - key: PYTHON_BIN
        value: python3
      - key: MAX_VIDEO_UPLOAD_MB
        value: "48"
      - key: MEMORY_GUARD_RSS_MB
        value: "420"
      - key: VIDEO_PROCESS_CONCURRENCY
        value: "1"
      - key: SERVER_VIDEO_PROCESSING_ENABLED
        value: "false"
      - key: SIX3_HEAVY_VIDEO_WORKER
        value: "false"
      - key: SIX3_HEAVY_ASSET_JOBS_ENABLED
        value: "false"
      - key: MUSIC_REMOTE_IMPORT_MAX_MB
        value: "50"
      - key: MUSIC_LICENSE_TEST_MODE
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
